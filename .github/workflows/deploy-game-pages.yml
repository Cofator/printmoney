name: Deploy Micropolis 2000 to GitHub Pages

# Publishes simcity/ to the gh-pages branch. GitHub serves that branch at
# https://cofator.github.io/printmoney/ (Pages is enabled automatically for
# a gh-pages branch; if not, enable it once in Settings -> Pages).
on:
  push:
    branches:
      - claude/simcity-2000-multiplayer-game-28n4s2
      - claude/moneyprinterturbo-setup-o75fk7
    paths:
      - 'simcity/**'
      - '.github/workflows/deploy-game-pages.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Publish simcity/ to gh-pages
        run: |
          set -eux
          cd simcity
          touch .nojekyll
          git init -b gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Deploy game from ${GITHUB_SHA::7}"
          git push --force "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" gh-pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
