name: Deploy Micropolis 2000 to GitHub Pages

on:
  push:
    branches:
      - claude/simcity-2000-multiplayer-game-28n4s2
      - claude/moneyprinterturbo-setup-o75fk7
    paths:
      - 'simcity/**'
      - '.github/workflows/deploy-game-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: simcity
      - id: deployment
        uses: actions/deploy-pages@v4
