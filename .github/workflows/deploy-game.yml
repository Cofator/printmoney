name: Deploy Game to GitHub Pages

# Publica o jogo (pasta game/) no GitHub Pages, sincronizando o conteúdo para o
# branch gh-pages. O GitHub Pages serve automaticamente esse branch, então o site
# https://cofator.github.io/printmoney/ é atualizado a cada push.
#
# Nenhum servidor é necessário: o Pages hospeda os arquivos estáticos e o
# multiplayer usa WebRTC peer-to-peer (broker público do PeerJS).

on:
  push:
    branches:
      - main
      - master
      - claude/aoe4-game-clone-lhgvxu
      - claude/moneyprinterturbo-setup-o75fk7
    paths:
      - 'game/**'
      - '.github/workflows/deploy-game.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: deploy-game
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Publish game/ to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./game
          publish_branch: gh-pages
          # cria .nojekyll automaticamente para servir pastas com _ e arquivos estáticos
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
          commit_message: 'Deploy game to GitHub Pages'
