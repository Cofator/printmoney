name: Deploy game to GitHub Pages

on:
  push:
    branches:
      - claude/moneyprinterturbo-setup-o75fk7
      - claude/cod-black-ops-2-clone-xivloi
      - main
      - master
    paths:
      - 'game/**'
      - '.github/workflows/deploy-game.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: game
      - id: deployment
        uses: actions/deploy-pages@v4
